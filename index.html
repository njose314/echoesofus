<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Falling For You - Finale</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
        margin: 0;
        overflow: hidden;
        background-color: #050505;
        font-family: 'Press Start 2P', cursive;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
    }

    #game-container {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111;
    }

    canvas {
        image-rendering: pixelated; /* Sharp retro pixels */
        box-shadow: 0 0 50px rgba(255, 0, 85, 0.1);
        max-width: 100%;
        max-height: 100%;
    }

    /* UI Overlay */
    #ui {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .hud-row {
        display: flex;
        justify-content: space-between;
        color: white;
        text-shadow: 2px 2px #ff0055;
        font-size: 14px;
    }

    /* Ammo Bar */
    #ammo-container {
        width: 100px;
        height: 10px;
        background: #333;
        border: 2px solid white;
        margin-top: 10px;
    }
    #ammo-fill {
        width: 100%;
        height: 100%;
        background: #ff0055;
        transition: width 0.1s;
    }

    /* Start Screen */
    #start-screen {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(5, 5, 5, 0.95);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        pointer-events: auto;
    }

    h1 {
        color: #ff0055;
        text-align: center;
        font-size: 30px;
        line-height: 1.5;
        margin-bottom: 30px;
        text-shadow: 4px 4px #fff;
    }

    button {
        background: #fff;
        border: 4px solid #ff0055;
        color: #ff0055;
        font-family: 'Press Start 2P', cursive;
        padding: 20px 40px;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.1s;
        box-shadow: 0 6px #88002d;
    }
    button:active { transform: translateY(6px); box-shadow: 0 0 #88002d; }

    #controls-hint {
        color: #666; font-size: 10px; margin-top: 20px; text-align: center; line-height: 1.6;
    }

    /* Invisible Touch Zones */
    #mobile-controls {
        position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 50; display: none;
    }
    .touch-zone { position: absolute; height: 100%; }
    #zone-left { left: 0; width: 30%; }
    #zone-right { right: 0; width: 30%; }
    #zone-fire { left: 30%; width: 40%; }
</style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div>
            <div class="hud-row">
                <span>DEPTH: <span id="depth">0</span>m</span>
                <span>HP: <span id="hp">❤❤❤</span></span>
            </div>
            <div id="ammo-container"><div id="ammo-fill"></div></div>
        </div>
    </div>

    <div id="mobile-controls">
        <div id="zone-left" class="touch-zone"></div>
        <div id="zone-fire" class="touch-zone"></div>
        <div id="zone-right" class="touch-zone"></div>
    </div>

    <div id="start-screen">
        <h1>FALLING<br>FOR YOU</h1>
        <button id="start-btn">TAKE THE PLUNGE</button>
        <div id="controls-hint">
            ARROWS to Move • SPACE to Shoot<br>
            (Mobile: Sides to Move • Center to Fire)
        </div>
    </div>
</div>

<script>
/** * AUDIO ENGINE 
 */
const Audio = {
    ctx: null,
    init: function() {
        window.AudioContext = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AudioContext();
    },
    playTone: function(freq, type, dur, vol=0.1) {
        if(!this.ctx) return;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, this.ctx.currentTime);
        g.gain.setValueAtTime(vol, this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
        o.connect(g);
        g.connect(this.ctx.destination);
        o.start();
        o.stop(this.ctx.currentTime + dur);
    },
    shoot: function() { this.playTone(200, 'square', 0.1); },
    jump: function() { this.playTone(300, 'sine', 0.1); },
    explode: function() { 
        if(!this.ctx) return;
        const b = this.ctx.createBuffer(1, 44100*0.2, 44100);
        const d = b.getChannelData(0);
        for(let i=0; i<d.length; i++) d[i] = Math.random()*2-1;
        const s = this.ctx.createBufferSource(); s.buffer = b;
        const g = this.ctx.createGain(); g.gain.value = 0.2;
        s.connect(g); g.connect(this.ctx.destination); s.start();
    },
    reload: function() { this.playTone(600, 'triangle', 0.1, 0.05); }
};

/** * GAME CONSTANTS & STATE 
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GRAVITY = 0.5;
const MAX_FALL = 10;
const SHOOT_FORCE = -4; // Recoil
const MOVE_SPEED = 0.8;
const MAX_AMMO = 8;

let gameState = 'MENU'; 
let score = 0;
let hp = 3;
let ammo = MAX_AMMO;
let frame = 0;
let shake = 0;
let timeScale = 1.0; // For Slo-Mo
let cameraY = 0;

// Inputs
const keys = { left: false, right: false, shoot: false, shootPressed: false };

// Entities
const player = { x: 0, y: 0, w: 16, h: 24, vx: 0, vy: 0, facing: 1, cooldown: 0, iframes: 0 };
let platforms = [];
let enemies = [];
let bullets = [];
let particles = [];
let texts = [];

// Screen Sizing
function resize() {
    // Fixed logic resolution (320px wide), scale up to fit screen
    const targetRatio = 320 / 480;
    const screenRatio = window.innerWidth / window.innerHeight;
    
    let w, h;
    if (screenRatio > targetRatio) {
        h = window.innerHeight;
        w = h * targetRatio;
    } else {
        w = window.innerWidth;
        h = w / targetRatio;
    }
    
    // Internal canvas resolution
    canvas.width = 320;
    canvas.height = 320 / screenRatio; // Adaptive height
    
    // CSS visual scaling handled by flex container
    canvas.style.width = `${window.innerWidth}px`;
    canvas.style.height = `${window.innerHeight}px`;
}
window.addEventListener('resize', resize);
resize();

function reset() {
    gameState = 'PLAY';
    player.x = canvas.width/2; player.y = 50; player.vx = 0; player.vy = 0;
    hp = 3; ammo = MAX_AMMO; score = 0; cameraY = 0;
    platforms = []; enemies = []; bullets = []; particles = []; texts = [];
    platforms.push({x: canvas.width/2-40, y: 150, w: 80, h: 10, type: 'safe'});
    generateLevel(cameraY + canvas.height*2);
    updateUI();
}

/** * LOGIC 
 */
function update() {
    // Slo-Mo Recovery
    if(timeScale < 1.0) timeScale += 0.05;
    if(timeScale > 1.0) timeScale = 1.0;

    // Apply Shake
    let shakeX = 0, shakeY = 0;
    if(shake > 0) {
        shakeX = (Math.random()-0.5)*shake;
        shakeY = (Math.random()-0.5)*shake;
        shake *= 0.9;
        if(shake < 0.5) shake = 0;
    }

    if (gameState !== 'PLAY') return;

    // 1. PLAYER PHYSICS
    if (keys.left) player.vx -= MOVE_SPEED * timeScale;
    if (keys.right) player.vx += MOVE_SPEED * timeScale;
    player.vx *= 0.85; // Friction

    player.vy += GRAVITY * timeScale;
    if(player.vy > MAX_FALL) player.vy = MAX_FALL;

    player.x += player.vx * timeScale;
    player.y += player.vy * timeScale;

    // Wrap
    if(player.x < -player.w) player.x = canvas.width;
    if(player.x > canvas.width) player.x = -player.w;

    // Camera
    let targetY = player.y - canvas.height * 0.3;
    if(targetY > cameraY) cameraY += (targetY - cameraY) * 0.1;

    // 2. SHOOTING (FIX: Ammo Check)
    if(player.cooldown > 0) player.cooldown--;
    
    if(keys.shoot && player.cooldown <= 0 && ammo > 0) {
        player.cooldown = 10;
        ammo--;
        updateUI();
        
        player.vy = -4; // Recoil Jump (The Infinite Fly Fix: Limited by ammo!)
        
        bullets.push({x: player.x+4, y: player.y+player.h, w: 8, h: 12, life: 30});
        Audio.shoot();
        shake = 3;
        
        // Shells
        for(let i=0; i<3; i++) spawnParticle(player.x+8, player.y+12, '#ff0055');
    }

    // 3. COLLISION (Player vs Platforms)
    platforms.forEach(p => {
        if(rectCol(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) {
            // Landing Logic (Only if falling and above platform)
            if(player.vy > 0 && player.y+player.h-player.vy*timeScale <= p.y + 5) {
                player.y = p.y - player.h;
                player.vy = 0;
                if(ammo < MAX_AMMO) { ammo = MAX_AMMO; Audio.reload(); updateUI(); } // RELOAD!
            }
        }
    });

    // 4. BULLETS vs ENEMIES
    for(let i=bullets.length-1; i>=0; i--) {
        let b = bullets[i];
        b.y += 15 * timeScale; // Bullets fall fast
        b.life--;
        
        for(let j=enemies.length-1; j>=0; j--) {
            let e = enemies[j];
            if(rectCol(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
                e.hp--;
                b.life = 0;
                spawnParticle(b.x, b.y, '#fff');
                
                if(e.hp <= 0) {
                    killEnemy(e, j);
                }
                break;
            }
        }
        if(b.life <= 0) bullets.splice(i, 1);
    }

    // 5. PLAYER vs ENEMIES
    if(player.iframes > 0) player.iframes--;
    
    enemies.forEach((e, idx) => {
        if(rectCol(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
            // Stomp Logic (Mario Style)
            if(player.vy > 0 && player.y+player.h-player.vy*timeScale <= e.y + e.h*0.5) {
                player.vy = -6; // Bounce
                ammo = MAX_AMMO; updateUI(); // Reload on stomp!
                killEnemy(e, idx);
                Audio.jump();
            } else if(player.iframes <= 0) {
                // Hurt Logic
                hp--;
                player.iframes = 60;
                player.vy = -5;
                shake = 10;
                timeScale = 0.1; // Impact freeze
                updateUI();
                if(hp <= 0) gameOver();
            }
        }
    });

    // Cleanup & Gen
    platforms = platforms.filter(p => p.y > cameraY - 50);
    enemies = enemies.filter(e => e.y > cameraY - 50);
    generateLevel(cameraY + canvas.height + 200);

    // Score
    let depth = Math.floor(player.y/10);
    if(depth > score) { score = depth; document.getElementById('depth').innerText = score; }

    // Particles & Text
    particles.forEach((p,i) => {
        p.x += p.vx * timeScale; p.y += p.vy * timeScale; p.life--;
        if(p.life<=0) particles.splice(i,1);
    });
    texts.forEach((t,i) => {
        t.y -= 1 * timeScale; t.life--;
        if(t.life<=0) texts.splice(i,1);
    });

    // RENDER
    render(shakeX, shakeY);
    requestAnimationFrame(update);
}

function render(sx, sy) {
    ctx.setTransform(1,0,0,1,0,0);
    ctx.fillStyle = '#050505';
    ctx.fillRect(0,0,canvas.width, canvas.height);

    ctx.translate(sx, sy - cameraY + 100); // Camera Offset

    // Platforms
    ctx.fillStyle = '#fff';
    platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#ff0055'; ctx.fillRect(p.x, p.y, p.w, 2); ctx.fillStyle='#fff';
    });

    // Enemies
    enemies.forEach(e => {
        ctx.fillStyle = e.type==='block' ? '#ff0055' : '#ff4444';
        ctx.fillRect(e.x, e.y, e.w, e.h);
        // Face
        ctx.fillStyle = '#fff';
        ctx.fillRect(e.x+5, e.y+5, 4, 4); ctx.fillRect(e.x+e.w-9, e.y+5, 4, 4);
        ctx.fillRect(e.x+8, e.y+15, e.w-16, 2);
    });

    // Bullets
    ctx.fillStyle = '#fff';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

    // Player (Procedural Sprite)
    if(player.iframes%4 < 2) { // Flicker if hurt
        ctx.save();
        ctx.translate(player.x + player.w/2, player.y + player.h/2);
        
        // Stretch based on velocity
        let sy = 1 + Math.abs(player.vy)*0.05;
        let sx = 1 / sy;
        ctx.scale(sx, sy);

        ctx.fillStyle = '#fff';
        ctx.fillRect(-8, -12, 16, 24); // Body
        ctx.fillStyle = '#ff0055';
        ctx.fillRect(-6, -8, 12, 4); // Scarf
        
        // Eyes
        ctx.fillStyle = '#000';
        if(keys.left) { ctx.fillRect(-6, -6, 2, 4); }
        else if(keys.right) { ctx.fillRect(4, -6, 2, 4); }
        else { ctx.fillRect(-4, -6, 2, 4); ctx.fillRect(2, -6, 2, 4); }
        
        ctx.restore();
    }

    // Particles
    particles.forEach(p => {
        ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 4, 4);
    });

    // Text
    ctx.font = '10px "Press Start 2P"';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    texts.forEach(t => ctx.fillText(t.str, t.x, t.y));
}

/** * LEVEL GEN & HELPERS 
 */
let lastY = 200;
function generateLevel(targetY) {
    while(lastY < targetY) {
        lastY += 60 + Math.random()*40;
        if(Math.random() > 0.3) {
            // Platform
            let w = 50 + Math.random()*60;
            let x = Math.random()*(canvas.width-w);
            platforms.push({x, y: lastY, w, h: 10});
            // Enemy?
            if(Math.random()>0.5) enemies.push({x: x+10, y: lastY-25, w: 20, h: 20, hp: 1, type: 'walker'});
        } else {
            // Floating Block
            let x = Math.random()*(canvas.width-30);
            enemies.push({x, y: lastY, w: 30, h: 30, hp: 3, type: 'block'});
        }
    }
}

function killEnemy(e, idx) {
    enemies.splice(idx, 1);
    Audio.explode();
    shake = 6;
    timeScale = 0.2; // SLO-MO EFFECT!
    spawnText(e.x, e.y);
    for(let i=0; i<8; i++) spawnParticle(e.x+e.w/2, e.y+e.h/2, '#ff0055');
}

const words = ["CUTE", "WOW", "HOT", "MINE", "YES", "BABY", "LOVE"];
function spawnText(x, y) {
    texts.push({x, y, str: words[Math.floor(Math.random()*words.length)], life: 40});
}

function spawnParticle(x, y, c) {
    particles.push({x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 20, c});
}

function rectCol(x1,y1,w1,h1, x2,y2,w2,h2) {
    return x1 < x2+w2 && x1+w1 > x2 && y1 < y2+h2 && y1+h1 > y2;
}

function updateUI() {
    let h = ""; for(let i=0; i<hp; i++) h+="❤";
    document.getElementById('hp').innerText = h;
    document.getElementById('ammo-fill').style.width = `${(ammo/MAX_AMMO)*100}%`;
}

function gameOver() {
    gameState = 'MENU';
    document.getElementById('start-screen').style.display = 'flex';
    document.querySelector('h1').innerHTML = "GAME OVER<br>SCORE: " + score;
    document.getElementById('start-btn').innerText = "TRY AGAIN";
}

// Controls
window.addEventListener('keydown', e => {
    if(e.code==='ArrowLeft') keys.left=true;
    if(e.code==='ArrowRight') keys.right=true;
    if(e.code==='Space') {
        if(gameState==='MENU') { 
            document.getElementById('start-screen').style.display='none'; 
            document.getElementById('mobile-controls').style.display='block';
            Audio.init(); reset(); update(); 
        }
        keys.shoot=true;
    }
});
window.addEventListener('keyup', e => {
    if(e.code==='ArrowLeft') keys.left=false;
    if(e.code==='ArrowRight') keys.right=false;
    if(e.code==='Space') keys.shoot=false;
});

// Touch
const touchStart = (key) => (e) => { e.preventDefault(); keys[key] = true; };
const touchEnd = (key) => (e) => { e.preventDefault(); keys[key] = false; };

document.getElementById('zone-left').addEventListener('touchstart', touchStart('left'));
document.getElementById('zone-left').addEventListener('touchend', touchEnd('left'));

document.getElementById('zone-right').addEventListener('touchstart', touchStart('right'));
document.getElementById('zone-right').addEventListener('touchend', touchEnd('right'));

document.getElementById('zone-fire').addEventListener('touchstart', (e) => {
    e.preventDefault(); keys.shoot=true;
});
document.getElementById('zone-fire').addEventListener('touchend', (e) => {
    e.preventDefault(); keys.shoot=false;
});

document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('start-screen').style.display='none';
    document.getElementById('mobile-controls').style.display='block';
    Audio.init(); reset(); update();
});

</script>
</body>
</html>
