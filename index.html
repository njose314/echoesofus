<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chrono-Kiss: The Finale</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Dancing+Script:wght@700&display=swap');

    :root {
        --neon-pink: #ff0055;
        --neon-blue: #00f3ff;
        --bg-dark: #050505;
    }

    body {
        margin: 0;
        overflow: hidden;
        background-color: var(--bg-dark);
        font-family: 'Orbitron', sans-serif;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
    }

    #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }

    canvas {
        display: block;
        filter: contrast(1.2) brightness(1.1);
    }

    /* --- UI OVERLAYS --- */
    .ui-layer {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
    }

    /* HUD */
    #hud {
        position: absolute;
        top: 20px;
        left: 20px;
        text-align: left;
        pointer-events: none;
    }
    .score-label {
        font-size: 14px; color: rgba(255,255,255,0.7); letter-spacing: 2px;
    }
    #score-display {
        font-size: 36px; color: var(--neon-pink); font-weight: 900;
        text-shadow: 0 0 10px var(--neon-pink);
    }

    /* SCREENS */
    .screen {
        background: rgba(5, 5, 5, 0.95);
        backdrop-filter: blur(10px);
        width: 100%; height: 100%;
        position: absolute;
        top: 0; left: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        transition: opacity 0.5s;
        pointer-events: auto;
    }
    .hidden { opacity: 0; pointer-events: none; }

    h1 {
        font-size: 48px; color: white; text-transform: uppercase;
        letter-spacing: 4px; margin: 0;
        background: linear-gradient(to right, var(--neon-blue), var(--neon-pink));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: glitch 3s infinite;
    }
    
    p { color: #aaa; max-width: 80%; text-align: center; line-height: 1.6; }

    .btn {
        margin-top: 40px;
        padding: 20px 60px;
        background: transparent;
        border: 2px solid var(--neon-pink);
        color: white;
        font-family: 'Orbitron', sans-serif;
        font-size: 18px;
        font-weight: 700;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: 0.3s;
        box-shadow: 0 0 15px var(--neon-pink);
    }
    .btn:active { transform: scale(0.95); }
    .btn::before {
        content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
        background: var(--neon-pink); transition: 0.3s; z-index: -1;
    }
    .btn:hover::before { left: 0; }

    /* --- THE ENVELOPE REVEAL (The "Kiss Day" Mechanic) --- */
    #letter-overlay {
        background: rgba(0,0,0,0.85);
        z-index: 200;
        display: none; /* Flex when active */
    }
    
    .envelope-container {
        width: 300px;
        height: 200px;
        background: #eee;
        border-radius: 10px;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 0 50px var(--neon-pink);
        transform: scale(0);
        animation: popIn 0.5s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .wax-seal {
        width: 60px; height: 60px;
        background: #d00000;
        border-radius: 50%;
        position: absolute;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 30px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        cursor: pointer;
        z-index: 10;
        transition: transform 0.2s;
    }
    .wax-seal:active { transform: scale(0.9); }

    .letter-paper {
        width: 90%; height: 90%;
        background: #fff0f5;
        position: absolute;
        top: 5%;
        border-radius: 5px;
        padding: 20px;
        box-sizing: border-box;
        font-family: 'Dancing Script', cursive;
        color: #d00000;
        font-size: 24px;
        text-align: center;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transform: translateY(20px);
        transition: 0.5s;
    }

    .letter-paper.open {
        opacity: 1;
        transform: translateY(0);
        z-index: 20;
    }

    .tap-hint {
        position: absolute; bottom: -40px; color: white; font-size: 12px; opacity: 0.5;
        animation: blink 2s infinite;
    }

    /* Animations */
    @keyframes glitch {
        0% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-blue); }
        90% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-blue); }
        92% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-blue); transform: translate(2px, -2px); }
        94% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-blue); transform: translate(-2px, 2px); }
        100% { transform: translate(0); }
    }
    @keyframes popIn { to { transform: scale(1); } }
    @keyframes blink { 50% { opacity: 1; } }

    /* Scanlines */
    .scanlines {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        background-size: 100% 4px, 6px 100%;
        pointer-events: none;
        z-index: 50;
    }
</style>
</head>
<body>

/**
 * --- AUDIO ENGINE (THE UNLOCKER) ---
 */
const Audio = {
    ctx: null,
    master: null,
    drone: null,
    filter: null,
    isInit: false,

    init: function() {
        if (this.isInit) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AC();
        
        // Master Chain
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.4;
        this.master.connect(this.ctx.destination);

        // Filter (Lowpass for underwater feel when slow)
        this.filter = this.ctx.createBiquadFilter();
        this.filter.type = 'lowpass';
        this.filter.frequency.value = 500;
        this.filter.connect(this.master);

        // Drone
        this.drone = this.ctx.createOscillator();
        this.drone.type = 'sawtooth'; // Gritty synth
        this.drone.frequency.value = 50; // Bass
        this.drone.start();

        // Drone Gain (Volume)
        const dGain = this.ctx.createGain();
        dGain.gain.value = 0.2;
        this.drone.connect(dGain);
        dGain.connect(this.filter);

        this.isInit = true;
        
        // Mobile Unlock
        if (this.ctx.state === 'suspended') this.ctx.resume();
    },

    update: function(timeScale) {
        if (!this.isInit) return;
        
        // Dynamic Filter: Opens up when time moves fast
        const targetFreq = 100 + (timeScale * 2000); 
        this.filter.frequency.setTargetAtTime(targetFreq, this.ctx.currentTime, 0.1);

        // Drone Pitch: Rises with speed
        const targetPitch = 50 + (timeScale * 50);
        this.drone.frequency.setTargetAtTime(targetPitch, this.ctx.currentTime, 0.1);
    },

    playSfx: function(type) {
        if (!this.isInit) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.master);

        const now = this.ctx.currentTime;
        if (type === 'collect') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, now);
            osc.frequency.exponentialRampToValueAtTime(1500, now + 0.3);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start();
            osc.stop(now + 0.5);
        } else if (type === 'hit') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
            osc.start();
            osc.stop(now + 0.5);
        }
    }
};

/**
 * --- GAME ENGINE ---
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false }); // Opt for speed

let width, height;
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Game State
let gameState = 'MENU'; // MENU, PLAY, PAUSE_LETTER, WIN, DEAD
let score = 0;
let timeScale = 0.05;
let collectedIds = new Set();
let shake = 0;
let frameCount = 0;

// Inputs
let input = { x: width/2, y: height/2, active: false };
let lastInput = { x: width/2, y: height/2 };

// Entities
const player = { x: width/2, y: height/2, size: 15, trail: [] };
let enemies = [];
let pickups = []; // Envelopes
let particles = [];
let backgroundStars = [];

// Init Background Stars
for(let i=0; i<100; i++) {
    backgroundStars.push({
        x: Math.random() * width,
        y: Math.random() * height,
        z: Math.random() * 2 + 0.5 // Depth
    });
}

// --- UTILS ---
function randomColor() {
    return `hsl(${Math.random()*60 + 320}, 100%, 60%)`; // Pink/Red/Purple
}

function spawnExplosion(x, y, color) {
    for(let i=0; i<20; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            life: 1.0,
            color: color || '#fff'
        });
    }
}

// --- CORE LOOPS ---
function startGame() {
    Audio.init();
    document.getElementById('start-screen').classList.add('hidden');
    resetGame();
}

function resetGame() {
    gameState = 'PLAY';
    score = 0;
    updateScore();
    collectedIds.clear();
    enemies = [];
    pickups = [];
    particles = [];
    player.x = width/2; player.y = height/2;
    player.trail = [];
    shake = 0;
    
    spawnPickup(); // Start with one
    // Initial enemies
    for(let i=0; i<5; i++) spawnEnemy();
    
    gameLoop();
}

function updateScore() {
    document.getElementById('score-display').innerText = `${score}/10`;
}

function spawnEnemy() {
    const side = Math.floor(Math.random() * 4);
    let x, y;
    if (side === 0) { x = Math.random() * width; y = -50; }
    else if (side === 1) { x = width + 50; y = Math.random() * height; }
    else if (side === 2) { x = Math.random() * width; y = height + 50; }
    else { x = -50; y = Math.random() * height; }

    enemies.push({
        x: x, y: y,
        vx: (Math.random() - 0.5), vy: (Math.random() - 0.5), // Drift
        speed: 2 + Math.random() * 3,
        size: 20 + Math.random() * 30,
        shape: Math.random() > 0.5 ? 3 : 4, // Triangle or Square
        angle: 0,
        spin: (Math.random() - 0.5) * 0.1
    });
}

function spawnPickup() {
    pickups.push({
        x: Math.random() * (width - 100) + 50,
        y: Math.random() * (height - 100) + 50,
        id: Math.floor(Math.random() * LOVE_DB.length),
        angle: 0
    });
}

// --- MAIN GAME LOOP ---
function gameLoop() {
    if (gameState === 'DEAD' || gameState === 'WIN') return;
    
    requestAnimationFrame(gameLoop);
    
    // 0. TIME DILATION LOGIC
    // Calculate movement delta
    let dx = input.x - lastInput.x;
    let dy = input.y - lastInput.y;
    let delta = Math.sqrt(dx*dx + dy*dy);
    lastInput.x = input.x;
    lastInput.y = input.y;
    
    // If input is active and moving, timeScale -> 1.0. Else -> 0.05
    let targetTime = (input.active && delta > 1) ? 1.0 : 0.05;
    if (gameState === 'PAUSE_LETTER') targetTime = 0; // Frozen
    
    // Lerp Time
    timeScale += (targetTime - timeScale) * 0.1;
    Audio.update(timeScale);

    // 1. UPDATE & RENDER
    // Clear with trails
    ctx.fillStyle = `rgba(5, 5, 5, 0.4)`; // Motion blur trail
    ctx.fillRect(0, 0, width, height);
    
    // Shake
    ctx.save();
    if (shake > 0) {
        let s = shake * (timeScale + 0.1); // Shake feels 'heavier' in slow mo
        ctx.translate((Math.random()-0.5)*s, (Math.random()-0.5)*s);
        shake *= 0.9;
    }

    // A. Draw Background Grid (Warped)
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1;
    const gridSize = 50;
    const timeOffset = frameCount * 0.5 * timeScale;
    
    ctx.beginPath();
    // Simple moving stars logic instead of expensive grid
    backgroundStars.forEach(star => {
        // Parallax move
        star.y += star.z * timeScale * 2; 
        if(star.y > height) star.y = 0;
        
        let size = star.z * 1.5;
        ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + timeScale*0.7})`;
        ctx.fillRect(star.x, star.y, size, size);
    });
    ctx.stroke();

    if (gameState === 'PAUSE_LETTER') {
        // Draw everything frozen, skip updates
        drawEntities(0); 
        ctx.restore();
        return;
    }

    // B. Player Logic
    let moveSpeed = 0.15;
    player.x += (input.x - player.x) * moveSpeed;
    player.y += (input.y - player.y) * moveSpeed;
    
    // Trail
    player.trail.push({x: player.x, y: player.y, age: 10});
    if(player.trail.length > 20) player.trail.shift();
    
    // Draw Player Trail (Neon Ribbon)
    if(player.trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(player.trail[0].x, player.trail[0].y);
        for(let p of player.trail) ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = `rgba(0, 243, 255, 0.5)`;
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#00f3ff';
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    // Draw Player Core
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 30;
    ctx.shadowColor = '#00f3ff';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size/2, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // C. Pickups (Envelopes)
    pickups.forEach((p, i) => {
        // Bobbing
        let bob = Math.sin(frameCount * 0.1) * 5;
        
        // Draw Envelope Emoji or Sprite
        ctx.font = "30px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ff0055';
        ctx.fillText("💌", p.x, p.y + bob);
        ctx.shadowBlur = 0;

        // Collision
        let dist = Math.hypot(player.x - p.x, player.y - p.y);
        if (dist < 40) {
            triggerLetter(p);
            pickups.splice(i, 1);
        }
    });

    // D. Enemies
    if (enemies.length < 15 && Math.random() < 0.05 * timeScale) spawnEnemy();

    enemies.forEach((e, i) => {
        // Move towards player
        let angle = Math.atan2(player.y - e.y, player.x - e.x);
        e.x += Math.cos(angle) * e.speed * timeScale;
        e.y += Math.sin(angle) * e.speed * timeScale;
        e.angle += e.spin * timeScale; // Rotate

        // Draw Glitch Shard
        ctx.save();
        ctx.translate(e.x, e.y);
        ctx.rotate(e.angle);
        
        // RGB Split Effect (Visual Polish)
        let split = 5 * (1.0 - timeScale); // More split when slow
        
        ctx.globalCompositeOperation = 'lighter'; // Additive blending
        
        // Red Channel
        ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
        drawShape(ctx, e.shape, e.size, -split, -split);
        // Blue Channel
        ctx.fillStyle = 'rgba(0, 255, 255, 0.5)';
        drawShape(ctx, e.shape, e.size, split, split);
        // Core
        ctx.fillStyle = '#ff3300';
        drawShape(ctx, e.shape, e.size, 0, 0);
        
        ctx.restore();

        // Collision
        let dist = Math.hypot(player.x - e.x, player.y - e.y);
        if (dist < (player.size + e.size)/2) {
            Audio.playSfx('hit');
            gameOver();
        }

        // Cleanup
        if(e.x < -100 || e.x > width+100 || e.y < -100 || e.y > height+100) enemies.splice(i,1);
    });

    // E. Particles
    particles.forEach((p, i) => {
        p.x += p.vx * timeScale;
        p.y += p.vy * timeScale;
        p.life -= 0.02 * (timeScale + 0.1); // Decay always
        
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.life;
        ctx.fillRect(p.x, p.y, 3, 3);
        ctx.globalAlpha = 1;
        
        if (p.life <= 0) particles.splice(i, 1);
    });

    ctx.restore();
    frameCount++;
}

function drawShape(ctx, sides, size, offsetX, offsetY) {
    ctx.beginPath();
    for (let i = 0; i < sides; i++) {
        let theta = (i / sides) * 2 * Math.PI;
        let x = offsetX + Math.cos(theta) * size/2;
        let y = offsetY + Math.sin(theta) * size/2;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
}

// --- LETTER MECHANIC ---
function triggerLetter(pickup) {
    // 1. Pause Game
    gameState = 'PAUSE_LETTER';
    Audio.playSfx('collect');
    
    // 2. Logic
    score++;
    updateScore();
    
    // 3. UI Reveal
    const overlay = document.getElementById('letter-overlay');
    const envelope = document.getElementById('envelope');
    const paper = document.getElementById('letter-text');
    const seal = document.getElementById('seal');
    
    // Reset Animation
    overlay.classList.remove('hidden');
    overlay.style.display = 'flex';
    paper.classList.remove('open');
    paper.innerHTML = ""; // clear text
    seal.style.transform = "scale(1)";
    
    // Handle Touch to Open
    seal.onclick = function(e) {
        e.stopPropagation();
        seal.style.transform = "scale(1.5)";
        setTimeout(() => {
            seal.style.transform = "scale(0)"; // Poof
            paper.classList.add('open');
            
            // Typewriter Effect
            const text = LOVE_DB[pickup.id] || "You are my favorite error.";
            let charIndex = 0;
            const typeInterval = setInterval(() => {
                paper.textContent += text.charAt(charIndex);
                charIndex++;
                if(charIndex >= text.length) clearInterval(typeInterval);
            }, 30); // Speed of typing
        }, 200);
    };

    // Handle Tap Anywhere to Resume (Only if opened)
    overlay.onclick = function() {
        if (paper.classList.contains('open')) {
            overlay.classList.add('hidden');
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
            gameState = 'PLAY';
            
            // Spawn next pickup or Win
            if (score >= 10) {
                setTimeout(winGame, 1000);
            } else {
                spawnPickup();
            }
        }
    };
}

function gameOver() {
    gameState = 'DEAD';
    shake = 20;
    setTimeout(() => {
        resetGame(); // Instant restart
    }, 500);
}

function winGame() {
    gameState = 'WIN';
    document.getElementById('win-screen').classList.remove('hidden');
}

// --- INPUT HANDLING ---
const handleInput = (x, y, active) => {
    input.x = x; input.y = y; input.active = active;
};

// Touch
document.addEventListener('touchstart', e => {
    e.preventDefault();
    handleInput(e.touches[0].clientX, e.touches[0].clientY, true);
}, {passive: false});
document.addEventListener('touchmove', e => {
    e.preventDefault();
    handleInput(e.touches[0].clientX, e.touches[0].clientY, true);
}, {passive: false});
document.addEventListener('touchend', () => {
    input.active = false;
});

// Mouse
document.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY, true));
document.addEventListener('mousedown', () => input.active = true);
document.addEventListener('mouseup', () => input.active = false);

// Init Button
document.getElementById('start-btn').addEventListener('click', startGame);
