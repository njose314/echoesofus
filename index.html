<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Falling For You</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
        margin: 0;
        overflow: hidden;
        background-color: #121212;
        font-family: 'Press Start 2P', cursive;
        touch-action: none; /* Prevents zooming/scrolling on mobile */
        user-select: none;
        -webkit-user-select: none;
    }

    #game-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: #121212;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    canvas {
        image-rendering: pixelated; /* Sharp pixels */
        box-shadow: 0 0 20px rgba(255, 0, 85, 0.2);
    }

    /* UI Overlay */
    #ui {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
        box-sizing: border-box;
    }

    .hud-text {
        color: white;
        text-shadow: 2px 2px #ff0055;
        font-size: 14px;
        line-height: 1.5;
    }

    #start-screen {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(18, 18, 18, 0.95);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        pointer-events: auto;
    }

    h1 {
        color: #ff0055;
        text-align: center;
        font-size: 24px;
        line-height: 1.5;
        margin-bottom: 30px;
        text-shadow: 4px 4px #fff;
    }

    button {
        background: #fff;
        border: 4px solid #ff0055;
        color: #ff0055;
        font-family: 'Press Start 2P', cursive;
        padding: 20px 40px;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.1s;
        box-shadow: 0 6px #88002d;
    }
    button:active {
        transform: translateY(6px);
        box-shadow: 0 0 #88002d;
    }

    #controls-hint {
        color: #666;
        font-size: 10px;
        margin-top: 20px;
        text-align: center;
        line-height: 1.6;
    }

    /* Mobile Controls Overlay */
    #mobile-controls {
        position: absolute;
        bottom: 0; left: 0; width: 100%; height: 100%;
        z-index: 50;
        display: none; /* Enabled via JS on touch */
    }
    .touch-zone { position: absolute; height: 100%; }
    #zone-left { left: 0; width: 30%; background: rgba(255,255,255,0.0); }
    #zone-right { right: 0; width: 30%; background: rgba(255,255,255,0.0); }
    #zone-fire { left: 30%; width: 40%; background: rgba(255,0,85,0.0); }

</style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div class="hud-text">DEPTH: <span id="depth">0</span>m</div>
        <div class="hud-text" style="text-align: right;">HP: <span id="hp">❤❤❤</span></div>
    </div>

    <div id="mobile-controls">
        <div id="zone-left" class="touch-zone"></div>
        <div id="zone-fire" class="touch-zone"></div>
        <div id="zone-right" class="touch-zone"></div>
    </div>

    <div id="start-screen">
        <h1>FALLING<br>FOR YOU</h1>
        <button id="start-btn">JUMP IN</button>
        <div id="controls-hint">
            DESKTOP: Arrows to Move, SPACE to Shoot<br>
            MOBILE: Sides to Move, Center to Shoot
        </div>
    </div>
</div>

<script>
/**
 * --- AUDIO ENGINE (SYNTHWAVE GENERATOR) ---
 * No external files. Pure math.
 */
const Audio = {
    ctx: null,
    init: function() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') this.ctx.resume();
    },
    playShoot: function() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(200, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.1);
    },
    playExplode: function() {
        if (!this.ctx) return;
        // White noise burst
        const bufferSize = this.ctx.sampleRate * 0.2;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
        noise.connect(gain);
        gain.connect(this.ctx.destination);
        noise.start();
    },
    playJump: function() {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(300, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.1);
    }
};

/**
 * --- GAME ENGINE ---
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Game Constants
const GRAVITY = 0.4;
const TERMINAL_VELOCITY = 8;
const JUMP_FORCE = -6;
const SHOOT_RECOIL = 3; // The "Downwell" mechanic
const FRICTION = 0.8;
const MOVE_SPEED = 1;

// State
let gameState = 'MENU'; // MENU, PLAY, GAMEOVER
let score = 0;
let hp = 3;
let frame = 0;
let shake = 0;
let hitStop = 0; // Freeze frames

// Camera
let cameraY = 0;

// Inputs
const keys = { left: false, right: false, shoot: false };

// Entities
const player = {
    x: 0, y: 0, w: 16, h: 24,
    vx: 0, vy: 0,
    facing: 1,
    cooldown: 0,
    grounded: false
};

let platforms = [];
let enemies = [];
let bullets = [];
let particles = [];
let floatyText = [];

// --- INITIALIZATION ---
function resize() {
    // Keep a fixed aspect ratio for that retro feel, scale up
    const aspect = window.innerWidth / window.innerHeight;
    canvas.height = 320; // Internal resolution height
    canvas.width = 320 * aspect;
    if (canvas.width > 400) canvas.width = 400; // Cap width
    
    // CSS handles the display scaling
}
window.addEventListener('resize', resize);
resize();

function resetGame() {
    gameState = 'PLAY';
    player.x = canvas.width / 2;
    player.y = 50;
    player.vx = 0; player.vy = 0;
    cameraY = 0;
    score = 0;
    hp = 3;
    updateHUD();
    
    platforms = [];
    enemies = [];
    bullets = [];
    particles = [];
    floatyText = [];
    
    // Initial Platform
    platforms.push({x: canvas.width/2 - 40, y: 150, w: 80, h: 10, type: 'solid'});
    
    // Generate initial chunk
    generateLevel(200);
}

// --- LEVEL GENERATION ---
let lastGenY = 200;
function generateLevel(targetY) {
    while (lastGenY < targetY + canvas.height) {
        lastGenY += 60 + Math.random() * 40; // Vertical gap
        
        let type = Math.random();
        
        // 1. Solid Platforms (Safe spots)
        if (type < 0.4) {
            let w = 40 + Math.random() * 60;
            let x = Math.random() * (canvas.width - w);
            platforms.push({x, y: lastGenY, w, h: 10, type: 'solid'});
            
            // Maybe add enemy on top
            if (Math.random() < 0.5) {
                enemies.push({
                    x: x + w/2 - 10, y: lastGenY - 20, w: 20, h: 20, 
                    type: 'walker', vx: 1, hp: 2
                });
            }
        } 
        // 2. Destructible Blocks (The "Doubts")
        else if (type < 0.8) {
            let x = Math.random() * (canvas.width - 30);
            enemies.push({
                x: x, y: lastGenY, w: 30, h: 30, 
                type: 'block', hp: 3
            });
        }
    }
}

// --- FLIRTY TEXT SYSTEM ---
const compliments = ["CUTE!", "WOW!", "LOVE!", "SEXY!", "MINE!", "HIT!", "YES!", "HOT!", "BABY!"];
function spawnText(x, y) {
    let text = compliments[Math.floor(Math.random() * compliments.length)];
    floatyText.push({x, y, text, life: 60, vy: -1});
}

// --- MAIN LOOP ---
function loop() {
    requestAnimationFrame(loop);
    
    if (gameState !== 'PLAY') return;

    // Hit Stop Logic (Juice)
    if (hitStop > 0) {
        hitStop--;
        return; 
    }

    // 1. UPDATE
    // Player Physics
    if (keys.left) player.vx -= MOVE_SPEED;
    if (keys.right) player.vx += MOVE_SPEED;
    player.vx *= FRICTION;
    player.vy += GRAVITY;
    if (player.vy > TERMINAL_VELOCITY) player.vy = TERMINAL_VELOCITY;

    // Facing
    if (keys.left) player.facing = -1;
    if (keys.right) player.facing = 1;

    // Shooting (The "Gunboots")
    if (keys.shoot && player.cooldown <= 0) {
        player.cooldown = 8;
        player.vy -= SHOOT_RECOIL; // RECOIL!
        player.vy = Math.min(player.vy, -2); // Ensure we pop up
        
        // Spawn Bullet
        bullets.push({
            x: player.x + player.w/2 - 4, y: player.y + player.h, 
            w: 8, h: 12, vy: 12, life: 30
        });
        
        // Shell Casings (Hearts)
        particles.push({
            x: player.x + player.w/2, y: player.y + player.h/2,
            vx: (Math.random() - 0.5) * 4, vy: -3 - Math.random(),
            life: 40, color: '#ff0055', type: 'heart'
        });

        Audio.playShoot();
        shake = 2;
    }
    if (player.cooldown > 0) player.cooldown--;

    // Move Player
    player.x += player.vx;
    player.y += player.vy;

    // Screen Wrap
    if (player.x < -player.w) player.x = canvas.width;
    if (player.x > canvas.width) player.x = -player.w;

    // Camera Follow (Downwell style: Camera moves down, never up)
    let targetCamY = player.y - canvas.height * 0.3;
    if (targetCamY > cameraY) {
        cameraY += (targetCamY - cameraY) * 0.1;
    }
    
    // Depth Score
    score = Math.floor(player.y / 10);
    document.getElementById('depth').innerText = score;
    
    // Generate Level
    generateLevel(cameraY + canvas.height * 1.5);

    // Collision: Player vs Platforms
    player.grounded = false;
    platforms.forEach(p => {
        if (rectIntersect(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) {
            // Only land if falling
            if (player.vy > 0 && player.y + player.h - player.vy <= p.y) {
                player.grounded = true;
                player.vy = 0;
                player.y = p.y - player.h;
                // Combo reset could go here
            }
        }
    });

    // Bullets Logic
    bullets.forEach((b, bi) => {
        b.y += b.vy;
        b.life--;
        
        // Bullet vs Enemy
        enemies.forEach((e, ei) => {
            if (rectIntersect(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
                e.hp--;
                b.life = 0;
                shake = 3;
                createExplosion(b.x, b.y + 10, '#fff');
                
                if (e.hp <= 0) {
                    enemies.splice(ei, 1);
                    hitStop = 3; // FREEZE FRAME
                    shake = 6;
                    Audio.playExplode();
                    spawnText(e.x, e.y);
                    createExplosion(e.x + e.w/2, e.y + e.h/2, '#ff0055');
                }
            }
        });
        
        if (b.life <= 0) bullets.splice(bi, 1);
    });

    // Enemy Logic
    enemies.forEach(e => {
        if (e.type === 'walker') {
            e.x += e.vx;
            if (e.x <= e.startX || e.x >= e.startX + 50) e.vx *= -1; // Patrolling
        }
        
        // Player vs Enemy (Damage)
        if (rectIntersect(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
            // Did we jump on it? (Mario style)
            if (player.vy > 0 && player.y + player.h - player.vy <= e.y + e.h * 0.5) {
                // Bounce
                player.vy = -6;
                e.hp -= 5; // Stomp kills
                shake = 4;
                Audio.playJump();
                createExplosion(player.x, player.y + player.h, '#fff');
            } else {
                // Take Damage
                hp--;
                updateHUD();
                shake = 10;
                hitStop = 5;
                player.vy = -5; // Knockback
                // Invincibility frames omitted for brevity, careful!
                enemies = enemies.filter(en => en !== e); // Remove enemy to prevent instant death loop
                
                if (hp <= 0) {
                    setTimeout(() => location.reload(), 1000);
                }
            }
        }
    });

    // Cleanup Offscreen
    platforms = platforms.filter(p => p.y > cameraY - 50);
    enemies = enemies.filter(e => e.y > cameraY - 50);

    // 2. RENDER
    ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset
    ctx.fillStyle = '#121212';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Apply Camera & Shake
    let shakeX = (Math.random() - 0.5) * shake;
    let shakeY = (Math.random() - 0.5) * shake;
    shake *= 0.9;
    ctx.translate(0, -cameraY + 50 + shakeY);
    ctx.translate(shakeX, 0);

    // Draw Platforms
    ctx.fillStyle = '#fff';
    platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        // Add a little red stripe
        ctx.fillStyle = '#ff0055';
        ctx.fillRect(p.x, p.y, p.w, 2);
        ctx.fillStyle = '#fff';
    });

    // Draw Enemies
    enemies.forEach(e => {
        if (e.type === 'block') {
            ctx.fillStyle = '#ff0055';
            ctx.fillRect(e.x, e.y, e.w, e.h);
            // Angry Eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(e.x + 5, e.y + 10, 5, 5);
            ctx.fillRect(e.x + e.w - 10, e.y + 10, 5, 5);
        } else {
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(e.x + e.w/2, e.y + e.h/2, e.w/2, 0, Math.PI*2);
            ctx.fill();
        }
    });

    // Draw Player (The Falling Human Sprite)
    drawPlayerSprite(ctx, player.x, player.y, player.w, player.h, player.facing, player.vy);

    // Draw Bullets
    ctx.fillStyle = '#fff';
    bullets.forEach(b => {
        ctx.fillRect(b.x, b.y, b.w, b.h);
    });

    // Draw Particles
    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        ctx.fillStyle = p.color;
        if (p.type === 'heart') {
            // Simple heart shape approximation
            ctx.fillRect(p.x, p.y, 4, 4); 
        } else {
            ctx.fillRect(p.x, p.y, 3, 3);
        }
        if (p.life <= 0) particles.splice(i, 1);
    });

    // Draw Floaty Text
    ctx.font = '10px "Press Start 2P"';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    floatyText.forEach((t, i) => {
        t.y += t.vy;
        t.life--;
        ctx.fillText(t.text, t.x, t.y);
        if (t.life <= 0) floatyText.splice(i, 1);
    });
    
    frame++;
}

// --- SPRITE DRAWER (Pixel Art Procedural) ---
function drawPlayerSprite(ctx, x, y, w, h, facing, vy) {
    ctx.save();
    ctx.translate(x + w/2, y + h/2);
    ctx.scale(facing, 1); // Flip based on direction
    
    // Falling Animation frame
    let frameOffset = (vy > 2) ? Math.sin(frame * 0.5) * 2 : 0;
    
    // Body (White)
    ctx.fillStyle = '#fff';
    ctx.fillRect(-6, -8, 12, 16);
    
    // Head
    ctx.fillRect(-7, -18 + frameOffset, 14, 10);
    
    // Legs (Flailing if falling)
    if (Math.abs(vy) > 1) {
        ctx.fillRect(-6, 8, 4, 6 + Math.sin(frame)*3);
        ctx.fillRect(2, 8, 4, 6 + Math.cos(frame)*3);
    } else {
        ctx.fillRect(-6, 8, 4, 6);
        ctx.fillRect(2, 8, 4, 6);
    }
    
    // Arms (Holding gun boots?? No, just flailing up)
    ctx.fillRect(-10, -6 - frameOffset, 4, 10);
    ctx.fillRect(6, -6 - frameOffset, 4, 10);
    
    // Scarf/Heart (Pink)
    ctx.fillStyle = '#ff0055';
    ctx.fillRect(-4, -8 + frameOffset, 8, 4); // Scarf
    
    ctx.restore();
}

// --- HELPERS ---
function createExplosion(x, y, color) {
    for (let i=0; i<10; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
            life: 20, color: color
        });
    }
}

function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
    return x2 < x1 + w1 && x2 + w2 > x1 && y2 < y1 + h1 && y2 + h2 > y1;
}

function updateHUD() {
    let hearts = "";
    for(let i=0; i<hp; i++) hearts += "❤";
    document.getElementById('hp').innerText = hearts;
}

// --- CONTROLS ---
window.addEventListener('keydown', e => {
    if (e.code === 'ArrowLeft') keys.left = true;
    if (e.code === 'ArrowRight') keys.right = true;
    if (e.code === 'Space') {
        if (gameState === 'MENU') {
            document.getElementById('start-btn').click();
        }
        keys.shoot = true;
    }
});
window.addEventListener('keyup', e => {
    if (e.code === 'ArrowLeft') keys.left = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'Space') keys.shoot = false;
});

// Touch controls
document.getElementById('zone-left').addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
document.getElementById('zone-left').addEventListener('touchend', (e) => { e.preventDefault(); keys.left = false; });

document.getElementById('zone-right').addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
document.getElementById('zone-right').addEventListener('touchend', (e) => { e.preventDefault(); keys.right = false; });

document.getElementById('zone-fire').addEventListener('touchstart', (e) => { 
    e.preventDefault(); 
    keys.shoot = true; 
});
document.getElementById('zone-fire').addEventListener('touchend', (e) => { 
    e.preventDefault(); 
    keys.shoot = false; 
});

// START
document.getElementById('start-btn').addEventListener('click', () => {
    Audio.init();
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('mobile-controls').style.display = 'block';
    resetGame();
    loop();
});

</script>
</body>
</html>
