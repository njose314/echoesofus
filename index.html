<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Falling For You - Finale</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
        margin: 0;
        overflow: hidden;
        background-color: #050505;
        font-family: 'Press Start 2P', cursive;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
    }

    #game-container {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111;
    }

    canvas {
        image-rendering: pixelated;
        box-shadow: 0 0 50px rgba(0, 243, 255, 0.1);
        width: 100%;
        height: 100%;
        max-width: 100%;
        object-fit: contain;
    }

    /* UI Overlay */
    #ui {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        padding: 20px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        z-index: 10;
    }

    .hud-row {
        display: flex;
        justify-content: space-between;
        color: white;
        text-shadow: 2px 2px #00f3ff;
        font-size: 14px;
        margin-bottom: 10px;
    }

    /* Bars */
    .bar-container {
        width: 100px; height: 10px; background: #333; border: 2px solid white; margin-bottom: 5px;
    }
    #ammo-fill { width: 100%; height: 100%; background: #ff0055; transition: width 0.1s; }
    
    /* Diamond Counter */
    #diamond-tracker {
        color: #00f3ff; text-align: right; font-size: 12px; margin-top: 5px;
    }

    /* FLOATING QUOTE OVERLAY */
    #floating-quote-container {
        position: absolute;
        top: 20%;
        left: 0; 
        width: 100%;
        text-align: center;
        pointer-events: none;
        z-index: 20;
        opacity: 0;
        transition: opacity 0.5s ease-in-out;
        display: flex;
        justify-content: center;
    }

    #floating-quote-text {
        background: rgba(0, 0, 0, 0.9);
        border: 2px solid #00f3ff;
        color: #fff;
        padding: 15px 25px;
        border-radius: 8px;
        font-size: 12px;
        line-height: 1.6;
        max-width: 80%;
        box-shadow: 0 0 20px #00f3ff;
        text-shadow: 1px 1px 0 #ff0055;
    }

    /* Screens */
    .screen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(5, 5, 5, 0.95);
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        z-index: 100; pointer-events: auto;
        text-align: center;
    }
    .hidden { display: none !important; }

    h1 {
        color: #00f3ff; font-size: 30px; line-height: 1.5; margin-bottom: 30px;
        text-shadow: 4px 4px #ff0055;
    }
    
    p { color: #ccc; font-size: 12px; line-height: 1.8; max-width: 80%; margin-bottom: 20px; }

    button {
        background: #00f3ff; border: 4px solid #fff; color: #000;
        font-family: 'Press Start 2P', cursive; padding: 20px 40px;
        font-size: 16px; cursor: pointer; transition: transform 0.1s;
        box-shadow: 0 6px #008899; margin-top: 20px;
    }
    button:active { transform: translateY(6px); box-shadow: 0 0 #008899; }
    
    /* Touch Zones */
    #mobile-controls {
        position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 50; display: none;
    }
    .touch-zone { position: absolute; height: 100%; }
    #zone-left { left: 0; width: 30%; }
    #zone-right { right: 0; width: 30%; }
    #zone-fire { left: 30%; width: 40%; }

</style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui">
        <div>
            <div class="hud-row">
                <span>DEPTH: <span id="depth">0</span>m</span>
                <span>HP: <span id="hp">❤❤❤</span></span>
            </div>
            <div class="bar-container"><div id="ammo-fill"></div></div>
            <div id="diamond-tracker">DIAMONDS: <span id="gems">0</span>/10 💎</div>
        </div>
    </div>

    <div id="floating-quote-container">
        <div id="floating-quote-text">SYSTEM MESSAGE...</div>
    </div>

    <div id="mobile-controls">
        <div id="zone-left" class="touch-zone"></div>
        <div id="zone-fire" class="touch-zone"></div>
        <div id="zone-right" class="touch-zone"></div>
    </div>

    <div id="start-screen" class="screen">
        <h1>FALLING<br>FOR YOU</h1>
        <p>Collect 10 Diamonds to Win Her Heart.</p>
        <button id="start-btn">JUMP IN</button>
        <p style="font-size: 10px; margin-top: 20px; color: #ff0055;">(Sound ON for Techno)</p>
    </div>

    <div id="win-screen" class="screen hidden">
        <h1 style="color: #ff0055;">MISSION COMPLETE</h1>
        <p>You collected all the fragments.</p>
        <p style="color: #00f3ff; margin-top: 20px;">"Just like this game, I will always catch you when you fall. Happy Valentine's Day."</p>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>

<audio id="bgm" loop>

/** * AUDIO ENGINE - MUSIC ONLY */
const Music = document.getElementById('bgm');
Music.volume = 0.6; // Good volume for techno

/** * GAME CONSTANTS */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GRAVITY = 0.5;
const MAX_FALL = 10;
const SHOOT_FORCE = -4; 
const MOVE_SPEED = 0.8;
const MAX_AMMO = 8;
const WIN_SCORE = 10;

let gameState = 'MENU'; 
let score = 0; // Depth
let diamonds = 0; 
let hp = 3;
let ammo = MAX_AMMO;
let frame = 0;
let shake = 0;
let timeScale = 1.0; 
let cameraY = 0;
let isQuoteActive = false; // Flag for Time Dilation

// Inputs
const keys = { left: false, right: false, shoot: false };

// Entities
const player = { x: 0, y: 0, w: 16, h: 24, vx: 0, vy: 0, facing: 1, cooldown: 0, iframes: 0 };
let platforms = [];
let enemies = [];
let bullets = [];
let particles = [];
let texts = [];
let gems = [];

// Resize
const INTERNAL_W = 320;
let INTERNAL_H = 480;

function handleResize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    INTERNAL_H = INTERNAL_W * (canvas.height / canvas.width);
}
window.addEventListener('resize', handleResize);
handleResize();

function reset() {
    gameState = 'PLAY';
    player.x = INTERNAL_W/2; player.y = 50; player.vx = 0; player.vy = 0;
    hp = 3; ammo = MAX_AMMO; score = 0; diamonds = 0; cameraY = 0;
    platforms = []; enemies = []; bullets = []; particles = []; texts = []; gems = [];
    platforms.push({x: INTERNAL_W/2-40, y: 150, w: 80, h: 10, type: 'safe'});
    generateLevel(cameraY + INTERNAL_H*2);
    updateUI();
    document.getElementById('floating-quote-container').style.opacity = 0;
}

/** * LOGIC */
function update() {
    if(gameState === 'WIN') return;
    
    // Time Scale Logic
    if(isQuoteActive) {
        // Force Slow Mo
        if(timeScale > 0.05) timeScale -= 0.1;
    } else {
        // Recovery
        if(timeScale < 1.0) timeScale += 0.05;
        if(timeScale > 1.0) timeScale = 1.0;
    }

    // Shake Decay
    if(shake > 0) shake *= 0.9;
    if(shake < 0.5) shake = 0;

    if (gameState !== 'PLAY') return;

    // 1. PLAYER PHYSICS
    if (keys.left) player.vx -= MOVE_SPEED * timeScale;
    if (keys.right) player.vx += MOVE_SPEED * timeScale;
    player.vx *= 0.85; 

    player.vy += GRAVITY * timeScale;
    if(player.vy > MAX_FALL) player.vy = MAX_FALL;

    player.x += player.vx * timeScale;
    player.y += player.vy * timeScale;

    // Wrap
    if(player.x < -player.w) player.x = INTERNAL_W;
    if(player.x > INTERNAL_W) player.x = -player.w;

    // Camera
    let targetY = player.y - INTERNAL_H * 0.3;
    if(targetY > cameraY) cameraY += (targetY - cameraY) * 0.1;

    // 2. SHOOTING 
    if(player.cooldown > 0) player.cooldown--;
    
    if(keys.shoot && player.cooldown <= 0 && ammo > 0) {
        player.cooldown = 10;
        ammo--;
        updateUI();
        player.vy = -4; 
        bullets.push({x: player.x+4, y: player.y+player.h, w: 8, h: 12, life: 30});
        // playSfx('shoot'); // DISABLED SFX
        shake = 3;
        for(let i=0; i<3; i++) spawnParticle(player.x+8, player.y+12, '#ff0055');
    }

    // 3. COLLISION
    platforms.forEach(p => {
        if(rectCol(player.x, player.y, player.w, player.h, p.x, p.y, p.w, p.h)) {
            if(player.vy > 0 && player.y+player.h-player.vy*timeScale <= p.y + 10) {
                player.y = p.y - player.h;
                player.vy = 0;
                if(ammo < MAX_AMMO) { ammo = MAX_AMMO; /* playSfx('collect'); */ updateUI(); }
            }
        }
    });

    // 4. BULLETS vs ENEMIES
    for(let i=bullets.length-1; i>=0; i--) {
        let b = bullets[i];
        b.y += 15 * timeScale; 
        b.life--;
        
        for(let j=enemies.length-1; j>=0; j--) {
            let e = enemies[j];
            if(rectCol(b.x, b.y, b.w, b.h, e.x, e.y, e.w, e.h)) {
                e.hp--;
                b.life = 0;
                spawnParticle(b.x, b.y, '#fff');
                if(e.hp <= 0) killEnemy(e, j);
                break;
            }
        }
        if(b.life <= 0) bullets.splice(i, 1);
    }

    // 5. PLAYER vs ENTITIES
    if(player.iframes > 0) player.iframes--;
    
    enemies.forEach((e, idx) => {
        // Sine Wave Movement
        if(e.type === 'floater') {
            e.x = e.startX + Math.sin(frame * 0.05) * 30;
        }

        if(rectCol(player.x, player.y, player.w, player.h, e.x, e.y, e.w, e.h)) {
            if(player.vy > 0 && player.y+player.h-player.vy*timeScale <= e.y + e.h*0.5) {
                player.vy = -6; 
                ammo = MAX_AMMO; updateUI(); 
                killEnemy(e, idx);
                // playSfx('jump'); // DISABLED SFX
            } else if(player.iframes <= 0) {
                hp--;
                player.iframes = 60;
                player.vy = -5;
                shake = 10;
                timeScale = 0.1; 
                updateUI();
                if(hp <= 0) gameOver();
            }
        }
    });

    // DIAMONDS
    for(let i=gems.length-1; i>=0; i--) {
        let g = gems[i];
        if(rectCol(player.x, player.y, player.w, player.h, g.x, g.y, g.w, g.h)) {
            collectDiamond(i);
        }
    }

    // Cleanup & Gen
    platforms = platforms.filter(p => p.y > cameraY - 50);
    enemies = enemies.filter(e => e.y > cameraY - 50);
    gems = gems.filter(g => g.y > cameraY - 50);
    generateLevel(cameraY + INTERNAL_H + 200);

    // Score
    let depth = Math.floor(player.y/10);
    if(depth > score) { score = depth; document.getElementById('depth').innerText = score; }

    // Particles
    particles.forEach((p,i) => {
        p.x += p.vx * timeScale; p.y += p.vy * timeScale; p.life--;
        if(p.life<=0) particles.splice(i,1);
    });
    texts.forEach((t,i) => {
        t.y -= 1 * timeScale; t.life--;
        if(t.life<=0) texts.splice(i,1);
    });

    frame++;
    render();
    requestAnimationFrame(update);
}

function render() {
    const scale = canvas.width / INTERNAL_W;
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
    
    ctx.fillStyle = '#050505';
    ctx.fillRect(0,0,INTERNAL_W, INTERNAL_H/scale * scale); 

    // Shake
    let sx = (Math.random()-0.5)*shake;
    let sy = (Math.random()-0.5)*shake;
    ctx.translate(sx, sy - cameraY + 100);

    // Platforms
    ctx.fillStyle = '#fff';
    platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#ff0055'; ctx.fillRect(p.x, p.y, p.w, 2); ctx.fillStyle='#fff';
    });

    // Gems
    gems.forEach(g => {
        ctx.fillStyle = '#00f3ff';
        ctx.beginPath();
        ctx.moveTo(g.x + g.w/2, g.y);
        ctx.lineTo(g.x + g.w, g.y + g.h/2);
        ctx.lineTo(g.x + g.w/2, g.y + g.h);
        ctx.lineTo(g.x, g.y + g.h/2);
        ctx.fill();
        ctx.shadowBlur = 10; ctx.shadowColor = '#00f3ff';
        ctx.fill(); ctx.shadowBlur = 0;
    });

    // Enemies
    enemies.forEach(e => {
        ctx.fillStyle = e.type==='block' ? '#ff0055' : '#ffaa00';
        ctx.fillRect(e.x, e.y, e.w, e.h);
        ctx.fillStyle = '#fff';
        ctx.fillRect(e.x+5, e.y+5, 4, 4); ctx.fillRect(e.x+e.w-9, e.y+5, 4, 4);
    });

    // Bullets
    ctx.fillStyle = '#fff';
    bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

    // Player
    if(player.iframes%4 < 2) {
        ctx.save();
        ctx.translate(player.x + player.w/2, player.y + player.h/2);
        let sy = 1 + Math.abs(player.vy)*0.05; ctx.scale(1/sy, sy);
        ctx.fillStyle = '#fff'; ctx.fillRect(-8, -12, 16, 24);
        ctx.fillStyle = '#ff0055'; ctx.fillRect(-6, -8, 12, 4);
        ctx.fillStyle = '#000';
        if(keys.left) ctx.fillRect(-6, -6, 2, 4);
        else if(keys.right) ctx.fillRect(4, -6, 2, 4);
        else { ctx.fillRect(-4, -6, 2, 4); ctx.fillRect(2, -6, 2, 4); }
        ctx.restore();
    }

    // Particles & Text
    particles.forEach(p => { ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 4, 4); });
    
    ctx.font = '10px "Press Start 2P"';
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    texts.forEach(t => ctx.fillText(t.str, t.x, t.y));
}

/** * LEVEL GEN */
let lastY = 200;
function generateLevel(targetY) {
    while(lastY < targetY) {
        lastY += 50 + Math.random()*40;
        let r = Math.random();
        
        // 10% Chance for Diamond
        if(Math.random() < 0.1) {
             let x = Math.random()*(INTERNAL_W-20);
             gems.push({x, y: lastY - 30, w: 15, h: 15});
        }

        if(r < 0.6) {
            let w = 50 + Math.random()*60;
            let x = Math.random()*(INTERNAL_W-w);
            platforms.push({x, y: lastY, w, h: 10});
            if(Math.random()>0.5) enemies.push({
                x: x+10, y: lastY-25, w: 20, h: 20, hp: 1, 
                type: Math.random()>0.5 ? 'walker' : 'floater',
                startX: x+10
            });
        } else {
            let x = Math.random()*(INTERNAL_W-30);
            enemies.push({x, y: lastY, w: 30, h: 30, hp: 3, type: 'block'});
        }
    }
}

/** * EVENTS & HELPERS */
const words = ["WOW!", "NICE!", "EPIC!", "GREAT!", "BOOM!", "COOL!"];

function killEnemy(e, idx) {
    enemies.splice(idx, 1);
    // playSfx('explosion'); // DISABLED SFX
    shake = 6;
    timeScale = 0.2; 
    spawnText(e.x, e.y);
    for(let i=0; i<8; i++) spawnParticle(e.x+e.w/2, e.y+e.h/2, '#ff0055');
}

function collectDiamond(idx) {
    gems.splice(idx, 1);
    diamonds++;
    // playSfx('collect'); // DISABLED SFX
    
    // --- THE NEW FLOATING UI MECHANIC ---
    isQuoteActive = true;
    
    // Get Random Quote
    const note = LOVE_DB[Math.floor(Math.random() * LOVE_DB.length)];
    const ui = document.getElementById('floating-quote-container');
    const text = document.getElementById('floating-quote-text');
    
    text.innerText = note;
    ui.style.opacity = 1;
    
    if(window.quoteTimeout) clearTimeout(window.quoteTimeout);
    
    window.quoteTimeout = setTimeout(() => {
        ui.style.opacity = 0;
        isQuoteActive = false; // Resume speed
    }, 2500);

    updateUI();
    
    if(diamonds >= WIN_SCORE) {
        setTimeout(winGame, 3000); 
    }
}

function spawnText(x, y) {
    texts.push({x, y, str: words[Math.floor(Math.random()*words.length)], life: 40});
}

function spawnParticle(x, y, c) {
    particles.push({x, y, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, life: 20, c});
}

function rectCol(x1,y1,w1,h1, x2,y2,w2,h2) {
    return x1 < x2+w2 && x1+w1 > x2 && y1 < y2+h2 && y1+h1 > y2;
}

function updateUI() {
    let h = ""; for(let i=0; i<hp; i++) h+="❤";
    document.getElementById('hp').innerText = h;
    document.getElementById('ammo-fill').style.width = `${(ammo/MAX_AMMO)*100}%`;
    document.getElementById('gems').innerText = diamonds;
}

function winGame() {
    gameState = 'WIN';
    // playSfx('win'); // DISABLED SFX
    document.getElementById('win-screen').classList.remove('hidden');
    document.getElementById('floating-quote-container').style.display = 'none';
}

function gameOver() {
    gameState = 'MENU';
    document.getElementById('start-screen').style.display = 'flex';
    document.querySelector('#start-screen h1').innerHTML = "GAME OVER";
    document.getElementById('start-btn').innerText = "TRY AGAIN";
}

// Controls
window.addEventListener('keydown', e => {
    if(e.code==='ArrowLeft') keys.left=true;
    if(e.code==='ArrowRight') keys.right=true;
    if(e.code==='Space') {
        if(gameState==='MENU') { 
            document.getElementById('start-screen').style.display='none'; 
            document.getElementById('mobile-controls').style.display='block';
            Music.play(); reset(); update(); 
        }
        keys.shoot=true;
    }
});
window.addEventListener('keyup', e => {
    if(e.code==='ArrowLeft') keys.left=false;
    if(e.code==='ArrowRight') keys.right=false;
    if(e.code==='Space') keys.shoot=false;
});

// Touch
const touchStart = (key) => (e) => { e.preventDefault(); keys[key] = true; };
const touchEnd = (key) => (e) => { e.preventDefault(); keys[key] = false; };
document.getElementById('zone-left').addEventListener('touchstart', touchStart('left'));
document.getElementById('zone-left').addEventListener('touchend', touchEnd('left'));
document.getElementById('zone-right').addEventListener('touchstart', touchStart('right'));
document.getElementById('zone-right').addEventListener('touchend', touchEnd('right'));
document.getElementById('zone-fire').addEventListener('touchstart', (e) => { e.preventDefault(); keys.shoot=true; });
document.getElementById('zone-fire').addEventListener('touchend', (e) => { e.preventDefault(); keys.shoot=false; });

document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('start-screen').style.display='none';
    document.getElementById('mobile-controls').style.display='block';
    Music.play(); reset(); update();
});

</script>
</body>
</html>
